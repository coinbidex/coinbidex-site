name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push Image"]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production   # add required reviewers in repo Settings → Environments if you want a manual gate
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 180s
          script: |
            set -e
            cd /var/www/coinbidex/coinbidex-site
            git fetch origin main
            git reset --hard origin/main
            export IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --no-build
            sleep 5
            curl -sf http://localhost:3030/health && echo "✅ coinbidex.com healthy" || echo "❌ Health check failed"
