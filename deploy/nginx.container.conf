server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 512;

    # Hashed build assets (JS/CSS from Vite) — cache forever, filenames change on every build
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # robots.txt / sitemap.xml / favicon — real files, short cache so updates propagate quickly
    location ~* \.(?:txt|xml|svg|png|ico)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Everything else falls through to index.html so React Router can handle
    # client-side routes like /markets or /crypto/bitcoin on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location = /health {
        return 200 "ok";
        add_header Content-Type text/plain;
        access_log off;
    }
}
